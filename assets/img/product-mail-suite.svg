<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="AmbiSecure email and document signing platform — S/MIME, PAdES, hardware-backed signing">
  <rect x="0" y="0" width="520" height="360" fill="#fff"/>

  <!-- background card -->
  <rect x="40" y="40" width="440" height="280" rx="10" fill="#FAFAFB" stroke="#E1E3E4"/>

  <!-- envelope -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="180" height="120" rx="6" fill="#fff" stroke="#3A3F40" stroke-width="1.5"/>
    <path d="M 0 0 L 90 70 L 180 0" fill="none" stroke="#3A3F40" stroke-width="1.5"/>
    <!-- subject lines -->
    <rect x="20" y="86" width="120" height="3" rx="1" fill="#E1E3E4"/>
    <rect x="20" y="96" width="90" height="3" rx="1" fill="#E1E3E4"/>
    <!-- seal -->
    <circle cx="150" cy="100" r="18" fill="#E3222A"/>
    <text x="150" y="106" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="700" font-size="14" fill="#fff">S</text>
  </g>

  <!-- document with PAdES seal -->
  <g transform="translate(290, 80)">
    <rect x="0" y="0" width="140" height="170" rx="4" fill="#fff" stroke="#3A3F40" stroke-width="1.5"/>
    <g fill="#E1E3E4">
      <rect x="14" y="20" width="112" height="4"/>
      <rect x="14" y="32" width="100" height="4"/>
      <rect x="14" y="44" width="112" height="4"/>
      <rect x="14" y="56" width="80" height="4"/>
      <rect x="14" y="78" width="112" height="4"/>
      <rect x="14" y="90" width="112" height="4"/>
      <rect x="14" y="102" width="90" height="4"/>
    </g>
    <!-- signature box -->
    <rect x="14" y="124" width="112" height="36" rx="3" fill="#FCEEEE" stroke="#E3222A" stroke-width="1.4"/>
    <text x="22" y="140" font-family="JetBrains Mono, monospace" font-size="9" fill="#3A3F40">SIGNED · PAdES-LT</text>
    <text x="22" y="152" font-family="JetBrains Mono, monospace" font-size="8" fill="#8C9092">RFC 3161 · TSA · LTV</text>
  </g>

  <!-- arrow connecting -->
  <g stroke="#3A3F40" stroke-width="2" fill="#3A3F40">
    <line x1="262" y1="160" x2="288" y2="160"/>
    <polygon points="288,160 280,156 280,164"/>
  </g>

  <!-- token at bottom -->
  <g transform="translate(80, 240)">
    <rect x="0" y="0" width="160" height="50" rx="22" fill="#1A1D1E"/>
    <circle cx="130" cy="25" r="10" fill="#E3222A"/>
    <text x="20" y="22" font-family="Montserrat, sans-serif" font-weight="700" font-size="13" fill="#fff">Ambi<tspan fill="#E3222A">Secure</tspan></text>
    <text x="20" y="38" font-family="JetBrains Mono, monospace" font-size="8" fill="#9aa0a3" letter-spacing="1.4">HARDWARE-BACKED SIGNING</text>
  </g>

  <g transform="translate(290, 250)">
    <text x="0" y="14" font-family="JetBrains Mono, monospace" font-size="10" fill="#3A3F40" letter-spacing="1.2">S/MIME · RFC 8551</text>
    <text x="0" y="28" font-family="JetBrains Mono, monospace" font-size="10" fill="#3A3F40" letter-spacing="1.2">PDF · PAdES · CAdES</text>
    <text x="0" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#3A3F40" letter-spacing="1.2">eIDAS Qualified · LTV</text>
  </g>
</svg>
