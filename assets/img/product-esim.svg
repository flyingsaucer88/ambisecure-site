<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="AmbiSecure eSIM / eUICC — embedded SIM secure element with profile management">
  <defs>
    <linearGradient id="esBoard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A4D60"/>
      <stop offset="100%" stop-color="#04222C"/>
    </linearGradient>
    <linearGradient id="esChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3F40"/>
      <stop offset="100%" stop-color="#1A1D1E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="520" height="360" fill="#fff"/>

  <!-- PCB -->
  <rect x="40" y="50" width="440" height="260" rx="10" fill="url(#esBoard)"/>

  <!-- traces -->
  <g stroke="#0E8C9C" stroke-width="2" fill="none" opacity="0.8">
    <path d="M 60 100 L 180 100 L 200 120 L 240 120"/>
    <path d="M 60 160 L 180 160 L 200 180 L 240 180"/>
    <path d="M 60 220 L 180 220 L 200 200 L 240 200"/>
    <path d="M 460 100 L 340 100 L 320 120 L 280 120"/>
    <path d="M 460 160 L 340 160 L 320 180 L 280 180"/>
    <path d="M 460 220 L 340 220 L 320 200 L 280 200"/>
  </g>

  <!-- eUICC chip -->
  <g transform="translate(200, 110)">
    <rect x="0" y="0" width="120" height="100" rx="6" fill="url(#esChip)" stroke="#000"/>
    <circle cx="12" cy="12" r="3" fill="#E3222A"/>
    <rect x="20" y="20" width="80" height="60" rx="2" fill="#222729" stroke="#3A3F40"/>
    <g font-family="JetBrains Mono, monospace" fill="#0E8C9C">
      <text x="60" y="40" text-anchor="middle" font-size="9" letter-spacing="1.4">AMBISECURE</text>
      <text x="60" y="52" text-anchor="middle" font-size="9" letter-spacing="1.4">eUICC · MFF2</text>
      <text x="60" y="66" text-anchor="middle" font-size="7" letter-spacing="1">SGP.22 / SGP.32</text>
    </g>
    <g fill="#0E8C9C">
      <rect x="0" y="30" width="6" height="8"/>
      <rect x="0" y="48" width="6" height="8"/>
      <rect x="0" y="66" width="6" height="8"/>
      <rect x="114" y="30" width="6" height="8"/>
      <rect x="114" y="48" width="6" height="8"/>
      <rect x="114" y="66" width="6" height="8"/>
    </g>
  </g>

  <!-- profile slots -->
  <g transform="translate(60, 250)" font-family="JetBrains Mono, monospace" font-size="9" fill="#0E8C9C" letter-spacing="1.2" opacity="0.85">
    <rect x="0" y="0" width="80" height="22" rx="3" fill="none" stroke="#0E8C9C"/>
    <text x="40" y="14" text-anchor="middle">PROFILE 1</text>
    <rect x="92" y="0" width="80" height="22" rx="3" fill="none" stroke="#0E8C9C"/>
    <text x="132" y="14" text-anchor="middle">PROFILE 2</text>
    <rect x="184" y="0" width="80" height="22" rx="3" fill="none" stroke="#0E8C9C"/>
    <text x="224" y="14" text-anchor="middle">PROFILE 3</text>
    <rect x="276" y="0" width="80" height="22" rx="3" fill="none" stroke="#0E8C9C" stroke-dasharray="3 3"/>
    <text x="316" y="14" text-anchor="middle" opacity="0.5">+ DOWNLOAD</text>
  </g>

  <g font-family="JetBrains Mono, monospace" fill="#9aa0a3" font-size="9" letter-spacing="1.4">
    <text x="60" y="328" opacity="0.85">SGP.22 · SGP.32 · M2M · CONSUMER · ICCID · EID</text>
  </g>
</svg>
