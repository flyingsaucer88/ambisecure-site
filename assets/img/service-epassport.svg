<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="ePassport platform — ICAO 9303 enrolment, personalisation, and PKI">
  <defs>
    <linearGradient id="ep-cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C1A1F"/>
      <stop offset="100%" stop-color="#3A0A0F"/>
    </linearGradient>
    <linearGradient id="ep-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFBF6"/>
      <stop offset="100%" stop-color="#E9E7DA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="520" height="360" fill="#fff"/>

  <!-- backdrop card -->
  <rect x="20" y="20" width="480" height="320" rx="10" fill="#FAFAFB" stroke="#E1E3E4"/>

  <!-- passport booklet -->
  <g transform="translate(60, 90)">
    <!-- shadow -->
    <rect x="6" y="10" width="220" height="170" rx="6" fill="rgba(0,0,0,0.15)"/>
    <!-- cover (left) -->
    <rect x="0" y="0" width="110" height="170" rx="6" fill="url(#ep-cover)"/>
    <!-- right page -->
    <rect x="110" y="0" width="120" height="170" rx="6" fill="url(#ep-page)" stroke="#D9D2BA" stroke-width="0.8"/>
    <!-- spine -->
    <rect x="108" y="0" width="4" height="170" fill="rgba(0,0,0,0.3)"/>
    <!-- cover crest -->
    <g transform="translate(55, 70)" font-family="Montserrat, sans-serif" fill="#D9B36A">
      <circle r="22" fill="none" stroke="#D9B36A" stroke-width="1.4"/>
      <text y="6" text-anchor="middle" font-weight="700" font-size="14">e?</text>
    </g>
    <text x="55" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#D9B36A" letter-spacing="1.6">PASSPORT</text>
    <text x="55" y="134" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#D9B36A" letter-spacing="1.2" opacity="0.8">ICAO 9303</text>

    <!-- right page contents -->
    <g transform="translate(126, 18)">
      <!-- photo -->
      <rect x="0" y="0" width="56" height="64" fill="#D8DADC" stroke="#9aa0a3" stroke-width="0.8"/>
      <circle cx="28" cy="24" r="10" fill="#9aa0a3"/>
      <path d="M10 60 Q 28 38 46 60 Z" fill="#9aa0a3"/>
      <!-- biographic data -->
      <g font-family="JetBrains Mono, monospace" font-size="7" fill="#3A3F40">
        <text x="64" y="10">P&lt;UTOA</text>
        <text x="64" y="22">SAMPLE</text>
        <text x="64" y="34">&lt;&lt;&lt;&lt;&lt;</text>
        <text x="0" y="84">MRZ ZONE</text>
      </g>
      <!-- chip glyph -->
      <g transform="translate(0, 96)" fill="#C49A4F">
        <rect width="16" height="18" rx="1"/>
        <rect x="3" y="3" width="10" height="12" rx="0.5" fill="#8E6A2F"/>
      </g>
      <text x="20" y="110" font-family="JetBrains Mono, monospace" font-size="7" fill="#3A3F40">CONTACTLESS · BAC/PACE</text>
    </g>
  </g>

  <!-- PKI / data flow -->
  <g transform="translate(310, 60)" font-family="JetBrains Mono, monospace">
    <text x="0" y="0" font-size="11" fill="#3A3F40" letter-spacing="1.4">ICAO 9303 TRUST CHAIN</text>
    <g font-size="10" fill="#3A3F40">
      <rect x="0" y="14" width="170" height="32" rx="4" fill="#fff" stroke="#E1E3E4"/>
      <text x="10" y="34">CSCA root</text>
      <line x1="22" y1="46" x2="22" y2="60" stroke="#3A3F40"/>
      <rect x="0" y="60" width="170" height="32" rx="4" fill="#fff" stroke="#E1E3E4"/>
      <text x="10" y="80">DSC issuing CA</text>
      <line x1="22" y1="92" x2="22" y2="106" stroke="#3A3F40"/>
      <rect x="0" y="106" width="170" height="32" rx="4" fill="#fff" stroke="#E1E3E4"/>
      <text x="10" y="126">Document Security Object</text>
      <line x1="22" y1="138" x2="22" y2="152" stroke="#3A3F40"/>
      <rect x="0" y="152" width="170" height="32" rx="4" fill="#E3222A" stroke="#9B0E16"/>
      <text x="10" y="172" fill="#fff">LDS · DG1–DG16</text>
      <text x="0" y="208" font-size="9" fill="#8C9092">PKD · enrolment · personalisation</text>
    </g>
  </g>

  <!-- footer -->
  <g font-family="JetBrains Mono, monospace" fill="#3A3F40" font-size="9" letter-spacing="1.4">
    <text x="60" y="320" opacity="0.7">ICAO 9303 · CSCA · DSC · PKD · LDS · BAC · PACE · EAC</text>
  </g>
</svg>
