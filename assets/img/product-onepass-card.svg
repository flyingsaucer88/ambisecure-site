<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="AmbiSecure OnePass Card — FIDO2 smart card, ISO 7810 ID-1, NFC and USB contact">
  <defs>
    <linearGradient id="opc-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FBFBFC"/>
      <stop offset="55%" stop-color="#F1F2F3"/>
      <stop offset="100%" stop-color="#E5E7E9"/>
    </linearGradient>
    <linearGradient id="opc-pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#D9B36A"/>
      <stop offset="100%" stop-color="#8E6A2F"/>
    </linearGradient>
    <linearGradient id="opc-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#9B0E16"/>
      <stop offset="100%" stop-color="#E3222A"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="520" height="360" fill="#fff"/>

  <!-- card shadow -->
  <rect x="48" y="62" width="424" height="266" rx="20" ry="20" fill="rgba(58,63,64,0.18)" transform="translate(0,8)"/>

  <!-- card body -->
  <rect x="40" y="50" width="424" height="266" rx="18" ry="18" fill="url(#opc-body)" stroke="#D8DADC" stroke-width="1"/>

  <!-- left red stripe -->
  <rect x="40" y="50" width="14" height="266" rx="0" ry="0" fill="url(#opc-stripe)"/>

  <!-- AmbiSecure wordmark -->
  <g font-family="Montserrat, Helvetica, Arial, sans-serif" font-weight="700">
    <text x="78" y="98" font-size="22" fill="#3A3F40">Ambi<tspan fill="#E3222A">Secure</tspan></text>
    <text x="78" y="118" font-family="Source Sans 3, Helvetica, sans-serif" font-size="11" letter-spacing="2" fill="#8C9092">ONEPASS · CARD</text>
  </g>

  <!-- ISO 7816 contact pad -->
  <g transform="translate(80, 168)">
    <rect x="0" y="0" width="98" height="120" rx="8" ry="8" fill="url(#opc-pad)" stroke="#8E6A2F" stroke-width="0.8"/>
    <rect x="48" y="6" width="2.5" height="108" fill="#F1F2F3"/>
    <rect x="6" y="34"  width="86" height="2" fill="#F1F2F3"/>
    <rect x="6" y="62"  width="86" height="2" fill="#F1F2F3"/>
    <rect x="6" y="90"  width="86" height="2" fill="#F1F2F3"/>
    <rect x="0" y="0" width="98" height="10" rx="8" ry="8" fill="rgba(255,255,255,0.20)"/>
  </g>

  <!-- contactless arc icon -->
  <g transform="translate(370, 90)" stroke="#3A3F40" fill="none" stroke-width="2.4" stroke-linecap="round">
    <path d="M 0 16 q 8 -10 16 0"/>
    <path d="M -6 22 q 14 -16 28 0"/>
    <path d="M -12 28 q 20 -22 40 0"/>
    <circle cx="8" cy="14" r="1.8" fill="#3A3F40"/>
  </g>

  <!-- USB-A connector mark on right side -->
  <g transform="translate(360, 168)" fill="#3A3F40">
    <rect x="0" y="0" width="64" height="40" rx="4" ry="4" fill="#3A3F40" opacity="0.92"/>
    <rect x="6" y="10" width="52" height="20" rx="1" fill="#fff"/>
    <rect x="14" y="14" width="8" height="12" fill="#3A3F40"/>
    <rect x="42" y="14" width="8" height="12" fill="#3A3F40"/>
    <text x="32" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#616A6C">USB-A · NFC</text>
  </g>

  <!-- card name plate / cardholder area -->
  <g font-family="JetBrains Mono, Menlo, monospace">
    <text x="200" y="208" font-size="10.5" fill="#616A6C" letter-spacing="1.2">CARDHOLDER</text>
    <text x="200" y="230" font-size="15" fill="#3A3F40">A. SAMPLE</text>
    <text x="200" y="262" font-size="10.5" fill="#616A6C" letter-spacing="1.2">CRED · FIDO2 RESIDENT</text>
    <text x="200" y="280" font-size="11" fill="#3A3F40">ID-1 · 85.6 × 53.98 mm</text>
  </g>

  <!-- standards line on bottom -->
  <g font-family="JetBrains Mono, monospace" fill="#8C9092" font-size="9">
    <text x="78" y="306" letter-spacing="1.2">FIDO2 · U2F · NFC · USB · PIV-COMPATIBLE</text>
  </g>

  <!-- top-right standards mark -->
  <text x="442" y="78" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#8C9092" letter-spacing="1.4">CC EAL6+</text>
</svg>
