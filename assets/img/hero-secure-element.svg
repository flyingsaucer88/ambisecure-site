<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" role="img" aria-label="ISO/IEC 7816 secure element contact pad">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9B36A"/>
      <stop offset="45%" stop-color="#C49A4F"/>
      <stop offset="100%" stop-color="#8E6A2F"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B98D3F"/>
      <stop offset="100%" stop-color="#6E4F1C"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(227,34,42,0.06)"/>
      <stop offset="100%" stop-color="rgba(227,34,42,0)"/>
    </radialGradient>
    <pattern id="trace" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(58,63,64,0.10)"/>
    </pattern>
  </defs>

  <!-- card body -->
  <rect x="20" y="20" width="420" height="420" rx="22" ry="22" fill="#FAFAFB" stroke="#E1E3E4" stroke-width="1.5"/>
  <rect x="20" y="20" width="420" height="420" rx="22" ry="22" fill="url(#trace)"/>
  <rect x="20" y="20" width="420" height="420" rx="22" ry="22" fill="url(#bgGlow)"/>

  <!-- top-right subtle trace -->
  <rect x="290" y="60" width="140" height="3" rx="1.5" fill="#E3222A" opacity="0.55"/>
  <rect x="370" y="60" width="3" height="40" rx="1.5" fill="#E3222A" opacity="0.40"/>

  <!-- bottom-left trace -->
  <rect x="40" y="395" width="120" height="3" rx="1.5" fill="#3A3F40" opacity="0.40"/>

  <!-- ISO 7816 contact pad — 2 columns x 4 rows, gold pads with hairline gaps -->
  <g transform="translate(115, 95)">
    <!-- outer plate -->
    <rect x="0" y="0" width="230" height="270" rx="14" ry="14" fill="url(#gold)" stroke="url(#goldDark)" stroke-width="1.5"/>

    <!-- inner gap lines (vertical) -->
    <rect x="113" y="8" width="4" height="254" fill="#FAFAFB"/>

    <!-- horizontal gap lines -->
    <rect x="8" y="66" width="214" height="4" fill="#FAFAFB"/>
    <rect x="8" y="132" width="214" height="4" fill="#FAFAFB"/>
    <rect x="8" y="198" width="214" height="4" fill="#FAFAFB"/>

    <!-- contact labels (C1-C8 ISO 7816 layout) -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#3A3F40" opacity="0.65">
      <text x="56"  y="42"  text-anchor="middle">C1 VCC</text>
      <text x="174" y="42"  text-anchor="middle">C5 GND</text>
      <text x="56"  y="108" text-anchor="middle">C2 RST</text>
      <text x="174" y="108" text-anchor="middle">C6 SPU</text>
      <text x="56"  y="174" text-anchor="middle">C3 CLK</text>
      <text x="174" y="174" text-anchor="middle">C7 I/O</text>
      <text x="56"  y="240" text-anchor="middle">C4 RFU</text>
      <text x="174" y="240" text-anchor="middle">C8 RFU</text>
    </g>

    <!-- subtle highlight on top edge -->
    <rect x="0" y="0" width="230" height="20" rx="14" ry="14" fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- corner identification text -->
  <g font-family="JetBrains Mono, Menlo, monospace" fill="#3A3F40">
    <text x="40"  y="50" font-size="11" letter-spacing="1.4" opacity="0.7">AMBISECURE / SE</text>
    <text x="40"  y="66" font-size="9"  opacity="0.55">CC EAL6+ · ISO/IEC 7816 · JavaCard 3.x</text>

    <text x="420" y="425" font-size="9"  opacity="0.55" text-anchor="end">SCP03 · GP 2.3.1</text>
    <text x="420" y="412" font-size="11" letter-spacing="1.2" opacity="0.7"  text-anchor="end">SECURE ELEMENT</text>
  </g>

  <!-- die marker tick -->
  <circle cx="40" cy="420" r="3" fill="#E3222A"/>
  <circle cx="420" cy="40" r="3" fill="#E3222A"/>
</svg>
