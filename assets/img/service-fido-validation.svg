<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="FIDO Validation Server — multi-tenant FIDO2 WebAuthn SaaS with attestation and MDS verification">
  <defs>
    <linearGradient id="fvBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFBFC"/>
      <stop offset="100%" stop-color="#EEEFF1"/>
    </linearGradient>
    <linearGradient id="fvServer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3F40"/>
      <stop offset="100%" stop-color="#1A1D1E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="520" height="360" fill="#fff"/>
  <rect x="20" y="20" width="480" height="320" rx="10" fill="#FAFAFB" stroke="#E1E3E4"/>

  <!-- authenticator (left) -->
  <g transform="translate(54, 140)">
    <rect x="0" y="0" width="100" height="50" rx="22" fill="url(#fvServer)"/>
    <circle cx="80" cy="25" r="8" fill="#E3222A"/>
    <text x="14" y="22" font-family="Montserrat, sans-serif" font-weight="700" font-size="11" fill="#fff">Ambi<tspan fill="#E3222A">Secure</tspan></text>
    <text x="14" y="36" font-family="JetBrains Mono, monospace" font-size="7" letter-spacing="1.2" fill="#9aa0a3">AUTHENTICATOR</text>
  </g>

  <!-- relying party browser (middle) -->
  <g transform="translate(206, 110)">
    <rect x="0" y="0" width="120" height="110" rx="6" fill="url(#fvBox)" stroke="#D8DADC"/>
    <rect x="0" y="0" width="120" height="18" rx="6" fill="#E1E3E4"/>
    <circle cx="10" cy="9" r="3" fill="#E3222A"/>
    <circle cx="22" cy="9" r="3" fill="#C49A4F"/>
    <circle cx="34" cy="9" r="3" fill="#0E8C9C"/>
    <text x="60" y="50" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="700" font-size="12" fill="#3A3F40">Relying Party</text>
    <text x="60" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8C9092" letter-spacing="1">webauthn-rs</text>
    <text x="60" y="86" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8C9092" letter-spacing="1">/begin · /finish</text>
  </g>

  <!-- validation server cluster (right) -->
  <g transform="translate(376, 70)">
    <rect x="0" y="0" width="106" height="220" rx="8" fill="url(#fvServer)"/>
    <g fill="#9aa0a3" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="1">
      <text x="14" y="22">VALIDATION</text>
      <text x="14" y="34">SERVER</text>
    </g>
    <!-- server rack lines -->
    <g stroke="#5C6062" stroke-width="1">
      <line x1="14" y1="50" x2="92" y2="50"/>
      <line x1="14" y1="80" x2="92" y2="80"/>
      <line x1="14" y1="110" x2="92" y2="110"/>
      <line x1="14" y1="140" x2="92" y2="140"/>
      <line x1="14" y1="170" x2="92" y2="170"/>
    </g>
    <g fill="#0E8C9C" font-family="JetBrains Mono, monospace" font-size="7" letter-spacing="0.8">
      <text x="14" y="44">attest verify</text>
      <text x="14" y="74">MDS lookup</text>
      <text x="14" y="104">policy engine</text>
      <text x="14" y="134">tenant scope</text>
      <text x="14" y="164">audit log</text>
    </g>
    <g fill="#E3222A">
      <circle cx="84" cy="42" r="2"/>
      <circle cx="84" cy="72" r="2"/>
      <circle cx="84" cy="102" r="2"/>
      <circle cx="84" cy="132" r="2"/>
      <circle cx="84" cy="162" r="2"/>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#3A3F40" stroke-width="1.8" fill="#3A3F40">
    <line x1="154" y1="165" x2="200" y2="165" marker-end="url(#fv-arrow)"/>
    <polygon points="206,165 196,160 196,170"/>
    <line x1="326" y1="165" x2="370" y2="165"/>
    <polygon points="376,165 366,160 366,170"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="8" fill="#3A3F40" letter-spacing="1">
    <text x="160" y="158">credential</text>
    <text x="330" y="158">REST · JWT</text>
  </g>

  <g font-family="JetBrains Mono, monospace" fill="#3A3F40" font-size="9" letter-spacing="1.4">
    <text x="60" y="320" opacity="0.7">FIDO2 · CTAP2.1 · WebAuthn L3 · FIDO MDS · MULTI-TENANT</text>
  </g>
</svg>
