<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3F40" />
      <stop offset="100%" stop-color="#1F2425" />
    </linearGradient>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect x="0" y="0" width="12" height="630" fill="#E3222A" />
  <rect x="1180" y="618" width="20" height="12" fill="#0E8C9C" />

  <!-- Eyebrow -->
  <text x="80" y="125" fill="#0E8C9C"
        font-family="Source Sans 3, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="600"
        letter-spacing="3.5">CONNECTED MOBILITY · V2X</text>

  <!-- Title -->
  <text x="80" y="220" fill="#FFFFFF" font-family="Montserrat, sans-serif" font-size="66" font-weight="700">Hardware-rooted</text>
  <text x="80" y="292" fill="#FFFFFF" font-family="Montserrat, sans-serif" font-size="66" font-weight="700">identity for V2X.</text>

  <!-- Tagline -->
  <text x="80" y="486" fill="#C9CFD0"
        font-family="Source Sans 3, Helvetica, sans-serif"
        font-size="24" font-weight="400">Secure-element integration for OBUs and RSUs.</text>
  <text x="80" y="518" fill="#C9CFD0"
        font-family="Source Sans 3, Helvetica, sans-serif"
        font-size="24" font-weight="400">IEEE 1609.2 · ETSI TS 103 097 · TEC 31318.</text>

  <!-- AS badge -->
  <g transform="translate(1040, 70)">
    <rect x="0" y="0" width="80" height="80" fill="#E3222A" rx="6" ry="6" />
    <text x="40" y="58" fill="#FFFFFF" text-anchor="middle"
          font-family="Montserrat, sans-serif" font-size="38" font-weight="700">AS</text>
  </g>

  <!-- Vehicle + secure-element motif (right side, lower-middle) -->
  <g transform="translate(700, 320)" opacity="0.95">
    <!-- Vehicle silhouette (side profile, simplified) -->
    <g stroke="#C9CFD0" stroke-width="2.2" fill="none">
      <!-- roof line -->
      <path d="M 20 110 L 100 60 L 280 60 L 360 110" />
      <!-- body -->
      <path d="M 0 110 L 0 175 L 410 175 L 410 110 Z" />
      <!-- windows -->
      <path d="M 105 65 L 105 108 L 200 108 L 200 65 Z" fill="#1F2425" />
      <path d="M 210 65 L 210 108 L 275 108 L 275 65 Z" fill="#1F2425" />
      <!-- wheels -->
      <circle cx="90" cy="175" r="32" fill="#1F2425" />
      <circle cx="90" cy="175" r="22" />
      <circle cx="320" cy="175" r="32" fill="#1F2425" />
      <circle cx="320" cy="175" r="22" />
    </g>

    <!-- Secure-element silicon package (QFN-style, sitting on top of the vehicle) -->
    <g transform="translate(140, -20)">
      <!-- pads -->
      <g fill="#E3222A">
        <rect x="-6" y="6" width="6" height="6" />
        <rect x="-6" y="22" width="6" height="6" />
        <rect x="-6" y="38" width="6" height="6" />
        <rect x="-6" y="54" width="6" height="6" />
        <rect x="80" y="6" width="6" height="6" />
        <rect x="80" y="22" width="6" height="6" />
        <rect x="80" y="38" width="6" height="6" />
        <rect x="80" y="54" width="6" height="6" />
        <rect x="6" y="-6" width="6" height="6" />
        <rect x="22" y="-6" width="6" height="6" />
        <rect x="38" y="-6" width="6" height="6" />
        <rect x="54" y="-6" width="6" height="6" />
        <rect x="6" y="60" width="6" height="6" />
        <rect x="22" y="60" width="6" height="6" />
        <rect x="38" y="60" width="6" height="6" />
        <rect x="54" y="60" width="6" height="6" />
      </g>
      <!-- silicon body -->
      <rect x="0" y="0" width="80" height="60" fill="#3A3F40" stroke="#E3222A" stroke-width="2" rx="3" />
      <!-- pin-1 dot -->
      <circle cx="10" cy="10" r="2.5" fill="#E3222A" />
      <!-- "SE" mark -->
      <text x="40" y="38" fill="#C9CFD0" text-anchor="middle"
            font-family="Montserrat, sans-serif" font-size="20" font-weight="700"
            letter-spacing="2">SE</text>
    </g>

    <!-- Signal arcs above the SE (representing V2X radio + PKI signing) -->
    <g stroke="#0E8C9C" stroke-width="2.2" fill="none" opacity="0.85">
      <path d="M 140 -45 Q 180 -75 220 -45" />
      <path d="M 128 -55 Q 180 -98 232 -55" />
      <path d="M 116 -65 Q 180 -120 244 -65" />
    </g>

    <!-- RSU mast on the right -->
    <g stroke="#C9CFD0" stroke-width="2.2" fill="none">
      <line x1="450" y1="175" x2="450" y2="40" />
      <rect x="430" y="20" width="40" height="20" fill="#3A3F40" stroke="#E3222A" stroke-width="2" />
      <text x="450" y="36" fill="#E3222A" text-anchor="middle"
            font-family="Montserrat, sans-serif" font-size="11" font-weight="700">RSU</text>
    </g>
    <!-- ground line -->
    <line x1="-10" y1="207" x2="480" y2="207" stroke="#5b6163" stroke-width="2" />
  </g>

  <!-- domain footer line -->
  <text x="80" y="588" fill="#9aa0a3"
        font-family="Montserrat, sans-serif" font-size="18" font-weight="600"
        letter-spacing="2.5">ambisecure.ambimat.com / industries / connected-mobility</text>
</svg>
