<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="AmbiSecure OnePass USB Key — hardware FIDO2 security key">
  <defs>
    <linearGradient id="uk-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3F40"/>
      <stop offset="100%" stop-color="#1A1D1E"/>
    </linearGradient>
    <linearGradient id="uk-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B0E16"/>
      <stop offset="100%" stop-color="#E3222A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="520" height="360" fill="#fff"/>

  <!-- key body -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="320" height="120" rx="22" ry="22" fill="url(#uk-body)"/>
    <rect x="0" y="0" width="320" height="14" rx="22" ry="22" fill="rgba(255,255,255,0.08)"/>
    <!-- red accent -->
    <rect x="22" y="36" width="60" height="6" rx="2" fill="url(#uk-stripe)"/>
    <!-- wordmark -->
    <g font-family="Montserrat, sans-serif" font-weight="700">
      <text x="22" y="74" font-size="20" fill="#fff">Ambi<tspan fill="#E3222A">Secure</tspan></text>
      <text x="22" y="92" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.6" fill="#9aa0a3">ONEPASS · USB KEY</text>
    </g>
    <!-- touch sensor -->
    <circle cx="240" cy="60" r="22" fill="none" stroke="#E3222A" stroke-width="3"/>
    <circle cx="240" cy="60" r="10" fill="#E3222A" opacity="0.85"/>
    <!-- keyring hole -->
    <circle cx="294" cy="60" r="6" fill="#1A1D1E" stroke="#9aa0a3" stroke-width="1"/>
  </g>

  <!-- USB-A connector -->
  <g transform="translate(380,148)">
    <rect x="0" y="0" width="84" height="64" rx="4" fill="#9aa0a3"/>
    <rect x="6" y="14" width="72" height="36" fill="#fff" stroke="#3A3F40" stroke-width="1"/>
    <rect x="18" y="22" width="14" height="20" fill="#3A3F40"/>
    <rect x="52" y="22" width="14" height="20" fill="#3A3F40"/>
    <text x="42" y="84" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#616A6C">USB-A · NFC</text>
  </g>

  <!-- standards line -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8C9092" letter-spacing="1.4">
    <text x="60" y="288">FIDO2 · CTAP2.1 · WebAuthn · ResidentKeys</text>
    <text x="60" y="304">CC EAL5+ · ISO/IEC 7816 · USB-A · NFC</text>
  </g>
</svg>
