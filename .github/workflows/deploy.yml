name: Deploy to Hostinger

# Triggers:
#   - workflow_dispatch → manual button in the GitHub Actions UI
#
# NOTE: automatic continuous deployment on push to main is intentionally
# DISABLED. Re-enable CD by uncommenting the `push:` block below.
#
# PROTOCOL: this deploys over SFTP (SSH), NOT FTP/FTPS. Hostinger shared
# hosting exposes SFTP on port 65002; plain FTP/FTPS (port 21) was timing out
# ("Failed to connect ... server only supports SFTP"). We upload with lftp's
# `mirror -R` rather than a Node-based deploy action because:
#   • lftp mirror uploads DOTFILES (.htaccess is critical — it carries every
#     redirect, the 410 rules and the security headers). Glob-based actions
#     (e.g. wlixcc/SFTP-Deploy-Action with `*`) silently skip dotfiles.
#   • it runs as a shell step, so it does not depend on a bundled Node 20/24
#     runtime and needs no ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION.
#   • the password is fed to lftp on stdin, so it never appears in argv/ps
#     or the logs (GitHub also masks the secret values).
#
# This is a static site (no package.json / no npm build): the deployable tree
# is produced by tools/build-hostinger-package.sh, not by a bundler.
on:
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - 'docs/**'
  #     - '.claude/**'
  #     - 'README.md'
  #     - '**/*.md'
  workflow_dispatch:

# If a new push lands while a deploy is in flight, cancel the old one —
# only the latest commit on main matters.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Hostinger public_html (SFTP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tooling (xmllint for audits, lftp for SFTP)
        # xmllint (libxml2-utils) validates sitemap.xml in the audit suite.
        # lftp is the SFTP client used for the upload.
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils lftp

      - name: Build deployable tree
        # Produces dist/ambisecure-hostinger/ — the exact tree that lands in
        # public_html. Excludes tools/, docs/, dist/, Logos/, scripts/,
        # _internal/, legacysitedata/, .git*, etc.
        run: bash tools/build-hostinger-package.sh

      - name: Run site audits (hard gate)
        # If any audit fails the deploy never starts.
        run: bash tools/audit-all.sh

      - name: Verify build output
        # Fail fast if the build tree is missing key files (incl. the dotfile
        # .htaccess, which the upload must ship).
        run: |
          set -euo pipefail
          test -d dist/ambisecure-hostinger
          test -f dist/ambisecure-hostinger/index.html
          test -f dist/ambisecure-hostinger/.htaccess
          test -f dist/ambisecure-hostinger/sitemap.xml
          test -f dist/ambisecure-hostinger/robots.txt
          echo "file count: $(find dist/ambisecure-hostinger -type f | wc -l)"
          find dist/ambisecure-hostinger -maxdepth 2 -type f | head -50

      - name: Test SFTP port is reachable
        # Non-secret-leaking connectivity check (host/port only; nc never
        # prints credentials). Confirms the SFTP port answers before we try
        # to authenticate. Guards first so a missing secret gives a clear
        # message instead of a cryptic "nc: port number invalid".
        env:
          SFTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          SFTP_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          set -euo pipefail
          : "${SFTP_HOST:?HOSTINGER_HOST secret is empty/unset — add it in repo Settings → Secrets and variables → Actions}"
          : "${SFTP_PORT:?HOSTINGER_PORT secret is empty/unset (Hostinger SFTP is usually 65002) — add it in repo Settings → Secrets}"
          echo "Testing SFTP reachability on the configured host:port…"
          nc -vz -w 10 "$SFTP_HOST" "$SFTP_PORT"

      - name: Deploy via SFTP (lftp mirror)
        env:
          SFTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          SFTP_USER: ${{ secrets.HOSTINGER_USERNAME }}
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
          SFTP_PORT: ${{ secrets.HOSTINGER_PORT }}
          SFTP_REMOTE: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          set -euo pipefail
          : "${SFTP_HOST:?HOSTINGER_HOST secret is not set}"
          : "${SFTP_USER:?HOSTINGER_USERNAME secret is not set}"
          : "${SFTP_PASS:?HOSTINGER_PASSWORD secret is not set}"
          : "${SFTP_REMOTE:?HOSTINGER_REMOTE_PATH secret is not set}"
          PORT="${SFTP_PORT:-65002}"
          # Do NOT enable `set -x` here — it would echo the password.
          # lftp reads its program from stdin (heredoc), so the password is
          # never passed on the command line / process list.
          lftp <<LFTP
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -p ${PORT} -o StrictHostKeyChecking=accept-new"
          open -u "${SFTP_USER}","${SFTP_PASS}" sftp://${SFTP_HOST}
          mirror -R --only-newer --no-perms --parallel=2 --exclude-glob .DS_Store --exclude-glob .git* "dist/ambisecure-hostinger/" "${SFTP_REMOTE}"
          bye
          LFTP

      - name: Success summary
        if: success()
        run: |
          echo "::notice title=Deploy succeeded::Mirrored dist/ambisecure-hostinger/ → Hostinger via SFTP."
          echo "Verify with: curl -sI https://ambisecure.ambimat.com/ | head -3"
