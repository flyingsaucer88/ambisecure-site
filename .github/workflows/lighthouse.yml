name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        # Blocks on regressions per .lighthouserc.json thresholds
        # (Performance ≥0.90, Accessibility ≥0.95, BP/SEO ≥0.95).
        run: lhci autorun --config=.lighthouserc.json

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci
          path: .lighthouseci

  htaccess-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Lint .htaccess (chains, loops, duplicates)
        run: python3 tools/lint-htaccess.py

  sitemap-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate sitemap XML
        run: xmllint --noout sitemap.xml

      - name: Sitemap URL count sanity check
        run: |
          count=$(grep -c "<loc>" sitemap.xml)
          echo "sitemap.xml contains $count URLs"
          test "$count" -ge 200 || (echo "FAIL: fewer than 200 URLs in sitemap" && exit 1)

  audit-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Audit content metadata
        run: python3 tools/audit-content.py

  audit-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: SEO + structural audit
        run: python3 tools/audit-seo.py

  audit-media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Media governance audit
        run: python3 tools/audit-media.py

  audit-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Content freshness audit (informational)
        run: python3 tools/audit-freshness.py --strict

  audit-yoast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Yoast-style SEO + readability audit
        run: python3 tools/audit-yoast.py --strict

  audit-circular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Circular-link / self-referencing-anchor audit
        run: python3 tools/audit-circular-links.py --hard-only
